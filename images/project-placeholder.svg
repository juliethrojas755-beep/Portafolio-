<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 350" width="100%" height="100%">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1E1E2E" />
      <stop offset="100%" stop-color="#0F0F1A" />
    </linearGradient>
    <linearGradient id="primary-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2563EB" />
      <stop offset="100%" stop-color="#7C3AED" />
    </linearGradient>
    <linearGradient id="accent-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#C4B5FD" />
      <stop offset="100%" stop-color="#7C3AED" />
    </linearGradient>
  </defs>

  <!-- Card background -->
  <rect width="600" height="350" fill="url(#bg-grad)" rx="16" />

  <!-- Code grid texture in back -->
  <g opacity="0.05" stroke="#FFFFFF" stroke-width="1">
    <pattern id="grid" width="30" height="30" patternUnits="userSpaceOnUse">
      <path d="M 30 0 L 0 0 0 30" fill="none" />
    </pattern>
    <rect width="600" height="350" fill="url(#grid)" />
  </g>

  <!-- Browser window chrome wrapper -->
  <rect x="25" y="25" width="550" height="300" rx="12" fill="#181825" stroke="#313244" stroke-width="1.5" />

  <!-- Browser header bar -->
  <path d="M25 57h550" stroke="#313244" stroke-width="1.5" />
  
  <!-- Window buttons -->
  <circle cx="45" cy="41" r="5" fill="#F38BA8" />
  <circle cx="60" cy="41" r="5" fill="#F9E2AF" />
  <circle cx="75" cy="41" r="5" fill="#A6E3A1" />

  <!-- Browser address bar -->
  <rect x="110" y="32" width="320" height="18" rx="6" fill="#11111b" />
  <text x="120" y="45" fill="#a6adc8" font-family="monospace" font-size="10">https://julieth.dev/project</text>

  <!-- Sidebar layout -->
  <rect x="25" y="58" width="60" height="266" rx="0" fill="#11111b" opacity="0.5" />
  <!-- Sidebar lines -->
  <g fill="none" stroke="#313244" stroke-width="3" stroke-linecap="round">
    <path d="M40 85h30M40 110h30M40 135h30M40 160h30" opacity="0.6" />
  </g>

  <!-- Main content dashboard area -->
  <!-- Left card (Charts & Graphs) -->
  <rect x="105" y="80" width="220" height="110" rx="8" fill="#1e1e2e" stroke="#313244" stroke-width="1" />
  <text x="120" y="105" fill="#cdd6f4" font-family="sans-serif" font-size="12" font-weight="bold">Lógica &amp; Datos</text>
  
  <!-- Chart visual -->
  <g fill="none" stroke-width="3" stroke-linecap="round">
    <!-- Chart line -->
    <path d="M125 155 l30-25 25 15 40-40 40 20" stroke="url(#primary-grad)" />
    <!-- Reference grid line -->
    <path d="M120 165h190" stroke="#313244" stroke-width="1" />
  </g>
  <!-- Chart dots -->
  <circle cx="155" cy="130" r="3" fill="#2563EB" />
  <circle cx="180" cy="145" r="3" fill="#7C3AED" />
  <circle cx="220" cy="105" r="3" fill="#C4B5FD" />

  <!-- Right card (Code Block representation) -->
  <rect x="345" y="80" width="210" height="225" rx="8" fill="#11111b" stroke="#313244" stroke-width="1" />
  
  <!-- Code text mockup -->
  <g font-family="monospace" font-size="11" font-weight="normal">
    <text x="360" y="110" fill="#f38ba8">def</text>
    <text x="388" y="110" fill="#89b4fa">manage_students</text>
    <text x="495" y="110" fill="#cdd6f4">():</text>
    
    <text x="380" y="130" fill="#cdd6f4">data = load_json()</text>
    
    <text x="380" y="150" fill="#f38ba8">for</text>
    <text x="408" y="150" fill="#cdd6f4">student</text>
    <text x="460" y="150" fill="#f38ba8">in</text>
    <text x="480" y="150" fill="#cdd6f4">data:</text>
    
    <text x="400" y="170" fill="#a6e3a1"># Calculate route</text>
    <text x="400" y="190" fill="#cdd6f4">assign_path(student)</text>
    
    <text x="380" y="220" fill="#f38ba8">return</text>
    <text x="430" y="220" fill="#c4b5fd">True</text>

    <!-- HTML styling tag visual -->
    <text x="360" y="255" fill="#f38ba8">&lt;div</text>
    <text x="398" y="255" fill="#fab387">class</text>
    <text x="435" y="255" fill="#a6e3a1">="premium-card"</text>
    <text x="532" y="255" fill="#f38ba8">&gt;</text>
    <text x="380" y="275" fill="#cdd6f4">Hello Julieth Tatiana!</text>
    <text x="360" y="295" fill="#f38ba8">&lt;/div&gt;</text>
  </g>

  <!-- Bottom-left card (Tech Badges mockup) -->
  <rect x="105" y="210" width="220" height="95" rx="8" fill="#1e1e2e" stroke="#313244" stroke-width="1" />
  <text x="120" y="235" fill="#cdd6f4" font-family="sans-serif" font-size="12" font-weight="bold">Tecnologías Clave</text>
  
  <!-- Dynamic badges visual -->
  <rect x="120" y="250" width="60" height="18" rx="4" fill="rgba(37, 99, 235, 0.15)" stroke="rgba(37, 99, 235, 0.3)" stroke-width="1" />
  <text x="130" y="263" fill="#89b4fa" font-family="sans-serif" font-size="9" font-weight="bold">PYTHON</text>

  <rect x="190" y="250" width="50" height="18" rx="4" fill="rgba(124, 58, 237, 0.15)" stroke="rgba(124, 58, 237, 0.3)" stroke-width="1" />
  <text x="203" y="263" fill="#c4b5fd" font-family="sans-serif" font-size="9" font-weight="bold">JS ES6</text>

  <rect x="250" y="250" width="60" height="18" rx="4" fill="rgba(166, 227, 161, 0.15)" stroke="rgba(166, 227, 161, 0.3)" stroke-width="1" />
  <text x="264" y="263" fill="#a6e3a1" font-family="sans-serif" font-size="9" font-weight="bold">SCRUM</text>
  
  <rect x="120" y="276" width="70" height="18" rx="4" fill="rgba(249, 226, 175, 0.15)" stroke="rgba(249, 226, 175, 0.3)" stroke-width="1" />
  <text x="130" y="289" fill="#f9e2af" font-family="sans-serif" font-size="9" font-weight="bold">SQL / DATA</text>
</svg>
